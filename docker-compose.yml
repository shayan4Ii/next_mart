services:

  backend:
    build:
      context: .

    container_name: django_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - mysql


  mysql:
    image: mysql:8.0

    container_name: mysql_database

    restart: always

    environment:
      MYSQL_DATABASE: nextmart
      MYSQL_USER: admin
      MYSQL_PASSWORD: Password123@
      MYSQL_ROOT_PASSWORD: Password123@

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql


volumes:
  mysql_data: